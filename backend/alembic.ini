# Alembic configuration file
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# ruta al directorio de migraciones (relativa al directorio donde se ejecuta alembic)
script_location = src/db/migrations

# Agrega el directorio actual (/app en el contenedor) a sys.path
# Necesario para que env.py pueda hacer: from src.config.settings import get_settings
prepend_sys_path = .

# URL de conexión — se sobreescribe en env.py con el valor de settings
sqlalchemy.url =

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
