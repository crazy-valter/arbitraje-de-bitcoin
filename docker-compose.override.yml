services:
  backend:
    build:
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src   # hot-reload del código Python
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://arbitrage_user:devpassword@db:5432/arbitrage_db
      REDIS_URL: redis://cache:6379/0
      ACCESS_TOKEN_SECRET: dev-access-secret-not-for-production
      REFRESH_TOKEN_SECRET: dev-refresh-secret-not-for-production
      ADMIN_EMAIL: dev@example.com
      ADMIN_PASSWORD: devpassword123
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}

  frontend:
    build:
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app                         # hot-reload del código Vue
      - frontend_node_modules:/app/node_modules  # node_modules aislado en Docker

  db:
    ports:
      - "5432:5432"   # expuesto para herramientas locales (DBeaver, pgAdmin)
    environment:
      POSTGRES_USER: arbitrage_user
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: arbitrage_db

  cache:
    ports:
      - "6379:6379"   # expuesto para inspección local (RedisInsight)

volumes:
  frontend_node_modules:
