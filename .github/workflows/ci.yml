name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Stage: test ──────────────────────────────────────────────────────────────

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
      - run: pip install uv
      - run: uv pip install --system ruff
      - run: ruff check backend/src/

  sast-bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
      - run: pip install uv
      - run: uv pip install --system bandit
      - run: bandit -r backend/src/ -ll --format json -o bandit-report.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "26"
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm lint
    continue-on-error: true   # No bloquea el pipeline en MVP

  # ── Stage: build ─────────────────────────────────────────────────────────────

  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint-backend, sast-bandit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build and push backend
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./backend
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bitcoin-arbitrage-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/bitcoin-arbitrage-backend:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/bitcoin-arbitrage-backend:latest
          cache-to: type=inline

      - name: Build and push frontend
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./frontend
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bitcoin-arbitrage-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/bitcoin-arbitrage-frontend:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/bitcoin-arbitrage-frontend:latest
          cache-to: type=inline
